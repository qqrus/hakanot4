services:
  postgres:
    image: postgres:16-alpine
    container_name: collabcode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabcode
      POSTGRES_USER: collabcode
      POSTGRES_PASSWORD: collabcode
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabcode -d collabcode"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - collabcode-postgres:/var/lib/postgresql/data

  python-runner:
    build:
      context: ./sandbox/python-runner
    image: collabcode-python-runner:latest
    container_name: collabcode-python-runner
    command: ["sh", "-c", "tail -f /dev/null"]
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: collabcode-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      python-runner:
        condition: service_started
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://collabcode:collabcode@postgres:5432/collabcode
      PYTHON_IMAGE: collabcode-python-runner:latest
      EXECUTION_TIMEOUT_MS: "8000"
      JWT_SECRET: change-me-super-secret-key
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: collabcode-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    environment:
      NEXT_PUBLIC_SERVER_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"

volumes:
  collabcode-postgres:
